###############################################
# Common Configuration
###############################################

x-common-keys: &common-keys
  restart: unless-stopped

  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

  environment:
    PUID: ${PUID}
    PGID: ${PGID}
    TZ: ${TZ}

  dns:
    - 1.1.1.1
    - 1.0.0.1

###############################################
# Services
###############################################

services:

###############################################
# RADARR - Movies
###############################################

  radarr:
    <<: *common-keys
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - "7878:7878"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_DIR}/radarr:/config
      - type: bind
        source: ${DATA_DIR}
        target: /data
        bind:
          propagation: rshared

###############################################
# SONARR - TV Shows
###############################################

  sonarr:
    <<: *common-keys
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - "8989:8989"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_DIR}/sonarr:/config
      - ${DATA_DIR}:/data

###############################################
# BAZARR - Subtitles
###############################################

  bazarr:
    <<: *common-keys
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    ports:
      - "6767:6767"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_DIR}/bazarr:/config
      - ${MEDIA_DIR}:/data/media

###############################################
# PROWLARR - Indexer Manager
###############################################

  prowlarr:
    <<: *common-keys
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - "9696:9696"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_DIR}/prowlarr:/config

###############################################
# QBITTORRENT - Downloader
###############################################

  qbittorrent:
    <<: *common-keys
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:latest
    ports:
      - "${QBITTORRENT_WEBUI_PORT}:8080"
      - "${QBITTORRENT_TORRENT_PORT}:6881"
      - "${QBITTORRENT_TORRENT_PORT}:6881/udp"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_DIR}/qbittorrent:/config
      - ${DATA_DIR}:/data

###############################################
# JELLYFIN - Media Server
###############################################

  jellyfin:
    <<: *common-keys
    container_name: jellyfin
    image: ghcr.io/hotio/jellyfin:latest
    ports:
      - "8096:8096"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_DIR}/jellyfin:/config
      - ${MEDIA_DIR}:/data/media:ro,rshared
      - /data/decypharr/downloads:/data/decypharr:ro

###############################################
# FLARESOLVERR - Cloudflare Bypass
###############################################

  # flaresolverr:
  #   <<: *common-keys
  #   container_name: flaresolverr
  #   image: ghcr.io/flaresolverr/flaresolverr:latest
  #   ports:
  #     - "8191:8191"
  #   environment:
  #     PUID: ${PUID}
  #     PGID: ${PGID}
  #     TZ: ${TZ}
  #     LOG_LEVEL: info

###############################################
# RECYCLARR - Sync TRaSH Guides
###############################################


  redis:
    image: redis:7-alpine
    volumes: [redis_data:/data]
  trawl:
    image: ghcr.io/germondai/trawl:latest
    ports: ["8191:8191"]
    shm_size: 1gb
    environment:
      REDIS_URL: redis://redis:6379
      BROWSER_POOL_SIZE: 3
      BROWSER_ACQUIRE_TIMEOUT_MS: 15000
    depends_on: [redis]

  recyclarr:
    <<: *common-keys
    container_name: recyclarr
    image: ghcr.io/recyclarr/recyclarr:8
    user: "${PUID}:${PGID}"
    volumes:
      - ${APPDATA_DIR}/recyclarr:/config

###############################################
# SEERR
###############################################

  seerr:
    <<: *common-keys
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    ports:
      - "5055:5055"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      PORT: 5055
      LOG_LEVEL: info
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_DIR}/seerr:/app/config

###############################################
# WHISPARR
###############################################

  whisparr:
    <<: *common-keys
    container_name: whisparr
    image: ghcr.io/thespad/whisparr:latest
    ports:
      - "6969:6969"
    volumes:
      - ${APPDATA_DIR}/whisparr:/config
      - ${DATA_DIR}:/data

###############################################
# Decypharr
###############################################

  decypharr:
    <<: *common-keys
    container_name: decypharr
    image: cy01/blackhole:latest
    ports:
      - "8282:8282"
    volumes:
      - /mnt:/mnt:rshared
      - ${APPDATA_DIR}/decypharr:/app
      - /data:/data:rshared
    devices:
      - /dev/fuse:/dev/fuse:rwm
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata

    volumes:
      - ${APPDATA_DIR}/jackett:/config
      - ${DOWNLOADS_DIR}:/downloads

    ports:
      - "9117:9117"


###############################################
# Network
###############################################

networks:
  default:
    name: arr_network

volumes:
  redis_data: